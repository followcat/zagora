name: Android Verify

on:
  push:
    branches:
      - main
      - release
    paths:
      - "mobile/android/**"
      - ".github/workflows/android-verify.yml"
  pull_request:
    paths:
      - "mobile/android/**"
      - ".github/workflows/android-verify.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile/android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Validate Android env
        run: bash scripts/verify_android_env.sh

      - name: Build debug APK
        run: gradle --no-daemon :app:assembleDebug

